      "recipeInstructions": [
        "（１）鶏肉は２ｃｍ角に切り、塩・こしょうする。なすはタテ４等分にし、２ｃｍ長さに切る。<br />パプリカは２ｃｍ角に切る。ホールトマトはボウルに入れて手でつぶす。",
