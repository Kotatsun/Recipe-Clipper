    <h1>ビーフシチューをおいしく作る方法</h1>
    <p>長い解説文が続きます。肉の選び方や煮込み時間の考え方など。</p>
    <h2>材料（作りやすい分量）</h2>
    <p>牛肉 1kg</p>
    <p>玉ねぎ 2個</p>
    <p>にんじん 1本</p>
    <p>赤ワイン 200ml</p>
    <p>デミグラスソース 1缶</p>
    <h2>作り方</h2>
    <p>1. 野菜を切る。玉ねぎは薄切り、にんじんは大きめに切る。</p>
    <p>2. 牛肉に下味をつける。</p>
    <p>3. 牛肉の表面を焼く。</p>
    <p>4. 玉ねぎを炒める。</p>
    <p>5. 赤ワインを加えて煮込む。</p>
    <p>6. デミグラスソースを加える。</p>
    <p>7. ソースをこして仕上げる。</p>
    <h2>材料</h2>
    <p>キャロットグラッセ</p>
    <p>無塩バター 大さじ1</p>
  </body>
