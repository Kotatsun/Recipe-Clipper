<html>
  <body>
    <h1>ふんわりリッチ♡バニラのパンナコッタ</h1>
    <p>アプリでひらく</p>
    <h2>材料</h2>
    <p>生クリーム 150g</p>
    <p>牛乳 100g</p>
    <p>グラニュー糖 20g</p>
    <p>粉ゼラチン 4g</p>
    <p>冷水 16g</p>
    <h2>作り方</h2>
    <p>1</p>
    <p>1. 粉ゼラチンを冷水でふやかす。</p>
    <p>2</p>
    <p>2. 生クリームと牛乳を鍋に入れる。</p>
    <p>3. グラニュー糖を加えて温める。</p>
    <p>4. ふやかしたゼラチンを加える。</p>
    <p>5. バニラを加える。</p>
    <p>6. 器に流す。</p>
    <p>7. 冷蔵庫で冷やし固める。</p>
    <p>8. カラメルソースを作る。</p>
    <p>9. カラメルソースをかける。</p>
    <p>10. よく冷やして完成。</p>
    <p>レシピを保存</p>
    <p>フォロー</p>
  </body>
</html>
