<html>
  <body>
    <h1>グラスティラミス</h1>
    <h2>材料</h2>
    <p>マスカルポーネチーズ</p>
    <p>125g</p>
    <p>生クリーム</p>
    <p>100ml</p>
    <p>グラニュー糖</p>
    <p>30g</p>
    <p>エスプレッソ または 濃いめのコーヒー</p>
    <p>適量</p>
    <p>純ココア</p>
    <p>適量</p>
    <h2>はじめに</h2>
    <p>材料を冷やしておきます。</p>
    <h2>作り方</h2>
    <p>1. マスカルポーネチーズをなめらかに混ぜる。</p>
    <p>2. 生クリームとグラニュー糖を泡立てる。</p>
    <p>3. スポンジケーキまたはカステラにコーヒーを染み込ませる。</p>
    <p>4. グラスに重ね、純ココアをふる。</p>
    <p>SNSでシェア</p>
    <p>レシピ一覧</p>
  </body>
</html>
