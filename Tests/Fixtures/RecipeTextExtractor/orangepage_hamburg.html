<html>
  <body>
    <h1>酒蒸しハンバーグ</h1>
    <h2>材料（2人分）</h2>
    <p>合いびき肉 220g</p>
    <p>ベーコン 2枚</p>
    <p>牛乳 大さじ2</p>
    <p>片栗粉 小さじ1</p>
    <p>ミニトマト 6個</p>
    <p>料理酒 大さじ3</p>
    <h2>作り方</h2>
    <p>（1）肉だねを作る</p>
    <p>ベーコンはキッチンばさみで細かく刻む。ひき肉、牛乳、片栗粉と合わせて粘りが出るまで混ぜる。</p>
    <p>（2）成形する</p>
    <p>ラップを広げて中央にオリーブオイル少々をたらし、肉だねをのせて形を整える。</p>
    <p>（3）焼く</p>
    <p>フライパンにバター15gを入れて中火にかけ、料理酒を加えて蒸し焼きにする。</p>
    <p>バックナンバー</p>
    <p>著者 料理家プロフィール</p>
  </body>
</html>
